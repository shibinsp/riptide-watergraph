name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt into Node 24 for JS actions now (clears the Node 20 deprecation warning).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests examples
      - name: Type check (mypy, advisory)
        run: mypy src
        continue-on-error: true
      - name: Tests + coverage
        run: pytest -q --cov=riptide_watergraph --cov-report=term-missing
      - name: Evaluation suite (offline)
        run: riptide eval --offline
