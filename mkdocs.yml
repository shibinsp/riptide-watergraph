site_name: Riptide-Watergraph
site_description: A reusable, "like water" multi-agent framework built as a thin layer on LangGraph.
site_url: https://shibinsp.github.io/riptide-watergraph/
repo_url: https://github.com/shibinsp/riptide-watergraph
repo_name: shibinsp/riptide-watergraph
edit_uri: edit/main/docs/
copyright: MIT licensed

theme:
  name: material
  icon:
    logo: material/waves
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - Getting started:
      - Install: install.md
      - Quickstart: quickstart.md
  - Studio:
      - Like Water Studio: studio.md
      - Streaming & interactive HITL: streaming-hitl.md
      - Monitoring: monitoring.md
  - Capabilities:
      - Tools & roles: tools-and-roles.md
      - Self-authored skills: skills.md
      - Cognitive memory: cognitive-memory.md
      - Deliberate reasoning: deliberation.md
      - Self-improvement: self-improvement.md
      - Autonomy: autonomy.md
      - Workflows: workflows.md
      - MCP interop: mcp.md
      - Evaluation: evaluation.md
  - Reference:
      - Architecture: architecture.md
      - HTTP API: api-reference.md
      - OpenAI-compatible API: openai-api.md
      - Multimodal (vision): multimodal.md
  - Operations:
      - Deploy: deploy.md
      - Demo walkthrough: demo.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shibinsp/riptide-watergraph
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/riptide-watergraph/
