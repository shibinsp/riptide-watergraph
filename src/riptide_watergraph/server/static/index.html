<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Like Water Studio · riptide-watergraph</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
  <link rel="stylesheet" href="/static/styles.css?v=fluent" />
  <script>
    // Set theme before paint to avoid a flash.
    (function () {
      try {
        var t = localStorage.getItem("lws-theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
    })();
  </script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo" aria-hidden="true" title="Riptide-Watergraph">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 7c2.4 0 2.4 2 4.8 2s2.4-2 4.8-2 2.4 2 4.8 2 2.4-2 4.8-2" />
            <path d="M2 12c2.4 0 2.4 2 4.8 2s2.4-2 4.8-2 2.4 2 4.8 2 2.4-2 4.8-2" />
            <path d="M2 17c2.4 0 2.4 2 4.8 2s2.4-2 4.8-2 2.4 2 4.8 2 2.4-2 4.8-2" />
          </svg>
        </div>
        <div class="wordmark">
          <span class="wordmark-title">Like Water Studio</span>
          <span class="wordmark-sub">riptide-watergraph</span>
        </div>
      </div>
      <div class="topbar-right">
        <button id="conn-pill" class="conn-pill" title="AI connection" data-view="connections">
          <span class="dot"></span><span id="conn-pill-label">Offline</span>
        </button>
        <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme"></button>
        <span id="version" class="version">v—</span>
      </div>
    </header>

    <div class="body">
      <aside class="sidebar">
        <nav id="nav"></nav>
      </aside>
      <main id="view" class="view"></main>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite"></div>
  <script src="/static/app.js?v=fluent" defer></script>
</body>
</html>
